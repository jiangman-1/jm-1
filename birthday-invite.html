<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Birthday Invite</title>
    <style>
        /* 引入可爱手写字体 */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fff5f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .invite-card {
            background: white;
            width: 650px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.15);
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 42px;
            font-weight: 700;
            margin: 0 0 20px;
            color: #ff69b4;
            text-align: center;
        }
        .date {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            margin: 0 0 25px;
            color: #ff85c0;
            text-align: center;
        }
        .image-group {
            display: flex;
            gap: 15px;
            margin-bottom: 28px;
        }
        .cake-img {
            width: 50%;
            border-radius: 8px;
            object-fit: cover;
        }
        h3 {
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ff69b4;
        }
        ul {
            font-size: 18px;
            line-height: 1.7;
            margin: 0 0 28px;
            padding-left: 28px;
            color: #444;
        }
        .location {
            font-size: 18px;
            color: #444;
        }
        .location a {
            color: #ff69b4;
            text-decoration: underline;
            font-weight: 600;
        }
        .location a:hover {
            color: #ff1493;
        }
    </style>
</head>
<body>
    <div class="invite-card">
        <h1>It's My Birthday!</h1>
        <p class="date">On the 26th March</p >
        
        <!-- 两张蛋糕图并排展示 -->
        <div class="image-group">
            <img src="https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=300&h=300&fit=crop" alt="Colorful Birthday Cake" class="cake-img">
            
        </div>
        
        <h3>What to bring:</h3>
        <ul>
            <li>Balloons (I love balloons 🎈)</li>
            <li>Cake (I'm really good at eating 🍰)</li>
            <li>An appetite (There will be lots of food 🥧)</li>
            <li>Your biggest smile 😊</li>
        </ul>

        <h3>This is where you need to go:</h3>
        <p class="location">
            <a href=" ">Google map link</a >
        </p >
    </div>
</body>
</html>
